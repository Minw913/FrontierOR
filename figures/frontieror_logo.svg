<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-label="FrontierOR">
  <!-- LP polytope hull -->
  <polygon points="6,12 14,4 26,9 28,21 13,28"
           fill="#52487b" fill-opacity="0.10"
           stroke="#52487b" stroke-width="1.5" stroke-linejoin="round" stroke-opacity="0.85"/>
  <!-- simplex trajectory: left-bottom (v4) → optimum (v2) -->
  <line x1="13" y1="28" x2="26" y2="9"
        stroke="#a68349" stroke-width="1.4" stroke-opacity="0.85"
        stroke-dasharray="2 2" stroke-linecap="round"/>
  <!-- vertices (purple) -->
  <circle cx="6"  cy="12" r="2.4" fill="#52487b"/>
  <circle cx="14" cy="4"  r="2.4" fill="#52487b"/>
  <circle cx="28" cy="21" r="2.4" fill="#52487b"/>
  <circle cx="13" cy="28" r="2.4" fill="#52487b"/>
  <!-- gold optimum vertex (v2) with halo -->
  <circle cx="26" cy="9" r="4"   fill="#d5a753" fill-opacity="0.22"/>
  <circle cx="26" cy="9" r="2.8" fill="#d5a753"/>
  <circle cx="26" cy="9" r="2.8" fill="none" stroke="#a68349" stroke-width="0.6"/>
</svg>
